dataset_root: data/generated/burgers_1d_offline/v0
ae_checkpoint: artifacts/runs/autoencoder_1d/last.pt
resume_checkpoint: null
regime: frozen
train_splits: [train]
eval_splits: [test]
context_features:
  - dt
  - viscosity
  - ic_amplitude
  - ic_bandwidth
  - forcing_amplitude
  - forcing_mode
  - domain_length
  - grid_size
rollout_horizon: 2
batch_size: 8
epochs: 10
learning_rate: 0.001
ae_learning_rate: 0.0005
weight_decay: 0.0
ae_weight_decay: 0.0
ae_loss_scale: 1.0
device: auto
num_workers: 0
prefetch_factor: 2
output_dir: artifacts/runs/dynamics_1d
loss_weights:
  latent_1step: 1.0
  phys_1step: 1.0
  rollout: 0.5
  consistency: 0.1
ae_loss_weights:
  l1: 1.0
  l2: 1.0
  gradient: 0.1
  spectral: 0.1
ema:
  decay: 0.995
